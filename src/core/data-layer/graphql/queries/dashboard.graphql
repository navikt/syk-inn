query AllDashboard {
    drafts {
        ...Draft
    }
    sykmeldinger {
        ... on Unrequested {
            aktuelle {
                ...Sykmelding
            }
        }
        ... on Requested {
            aktuelle {
                ...Sykmelding
            }
            historiske {
                ...Sykmelding
            }
        }
    }
    konsultasjon {
        ...Konsultasjon
    }
}
